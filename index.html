<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traductor Chi-Esp</title>
    <style>
        :root { --p: #2d6a4f; --s: #40916c; --bg: #f0f4f8; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .card { background: white; border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 450px; text-align: center; }
        h1 { font-size: 1.5rem; color: var(--p); margin-bottom: 25px; font-weight: 800; }
        .btn-group { display: flex; gap: 12px; justify-content: center; margin-bottom: 25px; }
        button { border: none; padding: 14px 20px; border-radius: 50px; color: white; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        #startBtn { background: var(--s); box-shadow: 0 4px 12px rgba(64,145,108,0.3); flex: 2; }
        #stopBtn { background: #ef476f; flex: 1; }
        .label { font-size: 0.7rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 8px 5px; text-align: left; }
        .box { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 16px; padding: 18px; min-height: 80px; font-size: 1.3rem; text-align: center; display: flex; align-items: center; justify-content: center; word-break: break-word; line-height: 1.4; }
        .signature { margin-top: 30px; font-size: 0.7rem; font-weight: bold; color: #adb5bd; text-transform: uppercase; letter-spacing: 2px; border-top: 1px solid #e2e8f0; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Traductor de Voz Chi-Esp</h1>
        <div class="btn-group">
            <button id="startBtn">🎤 Nueva Frase</button>
            <button id="stopBtn">⏹ Parar</button>
        </div>
        <div class="label">Dices en Chino:</div>
        <div id="chino" class="box">Esperando...</div>
        <div class="label">Traducción:</div>
        <div id="espanol" class="box" style="color:var(--p); font-weight:600; background: #eefdf5;">...</div>
        <div id="firma" class="signature">BY FEDE FOR HIS STUDENTS</div>
    </div>

    <script>
        // Lógica para cambiar el nombre según el enlace
        const params = new URLSearchParams(window.location.search);
        const nombre = params.get('n');
        if (nombre) {
            document.getElementById('firma').innerText = "BY FEDE FOR " + nombre.toUpperCase();
        }

        const recognition = new (window.webkitSpeechRecognition || window.Recognition)();
        recognition.lang = 'zh-CN'; recognition.continuous = true; recognition.interimResults = true;
        let textoAcumulado = "";

        recognition.onresult = (e) => {
            let pinterim = '';
            for (let i = e.resultIndex; i < e.results.length; i++) {
                let transcript = e.results[i][0].transcript.replace(/[。.，,]/g, "");
                if (e.results[i].isFinal) { textoAcumulado += transcript; } 
                else { pinterim += transcript; }
            }
            let mostrar = (textoAcumulado + pinterim).trim();
            if(mostrar !== "") {
                document.getElementById('chino').innerText = mostrar;
                fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(mostrar)}&langpair=zh-CN|es`)
                    .then(r => r.json()).then(d => {
                        document.getElementById('espanol').innerText = d.responseData.translatedText;
                    });
            }
        };

        document.getElementById('startBtn').onclick = () => {
            textoAcumulado = ""; document.getElementById('chino').innerText = "...";
            document.getElementById('espanol').innerText = "...";
            try { recognition.start(); } catch(err) {}
            document.getElementById('startBtn').innerText = "Escuchando...";
        };
        document.getElementById('stopBtn').onclick = () => {
            recognition.stop();
            document.getElementById('startBtn').innerText = "🎤 Nueva Frase";
        };
    </script>
</body>
</html>
