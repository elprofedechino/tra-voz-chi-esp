<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Chino - Fede</title>
    <style>
        :root { --p: #2d6a4f; --s: #40916c; --bg: #f0f4f8; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: white; border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 500px; text-align: center; }
        h1 { font-size: 1.4rem; color: var(--p); margin-bottom: 25px; }
        .btn-group { display: flex; gap: 12px; justify-content: center; margin-bottom: 25px; }
        button { border: none; padding: 14px 24px; border-radius: 50px; color: white; font-weight: 600; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        #startBtn { background: var(--s); box-shadow: 0 4px 12px rgba(64,145,108,0.3); }
        #stopBtn { background: #ef476f; }
        .label { font-size: 0.7rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 8px 5px; text-align: left; }
        /* Añadido scroll para que el historial no se salga de la pantalla */
        .box { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 16px; padding: 18px; min-height: 100px; max-height: 200px; font-size: 1.1rem; text-align: left; overflow-y: auto; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🇨🇳 Traductor de Voz Pro</h1>
        <div class="btn-group">
            <button id="startBtn">🎤 Empezar</button>
            <button id="stopBtn">⏹ Parar</button>
        </div>
        <div class="label">Historial Chino:</div>
        <div id="chino" class="box"></div>
        <div class="label">Historial Español:</div>
        <div id="espanol" class="box" style="color:var(--p); font-weight:500;"></div>
    </div>
    <script>
        const recognition = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
        recognition.lang = 'zh-CN'; 
        recognition.continuous = true; 
        recognition.interimResults = false; // Solo guardamos frases completas para no saturar

        let historialChino = "";
        let historialEspanol = "";

        recognition.onresult = (e) => {
            let nuevaFrase = "";
            for (let i = e.resultIndex; i < e.results.length; i++) {
                if (e.results[i].isFinal) {
                    nuevaFrase = e.results[i][0].transcript;
                }
            }

            if (nuevaFrase !== "") {
                historialChino += nuevaFrase + "\n";
                document.getElementById('chino').innerText = historialChino;
                
                // Traducir la nueva frase y añadirla al historial
                fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(nuevaFrase)}&langpair=zh-CN|es`)
                    .then(r => r.json()).then(d => {
                        historialEspanol += d.responseData.translatedText + "\n";
                        document.getElementById('espanol').innerText = historialEspanol;
                        
                        // Auto-scroll al final
                        document.getElementById('chino').scrollTop = document.getElementById('chino').scrollHeight;
                        document.getElementById('espanol').scrollTop = document.getElementById('espanol').scrollHeight;
                    });
            }
        };

        document.getElementById('startBtn').onclick = () => {
            recognition.start();
            document.getElementById('startBtn').style.opacity = "0.5";
            document.getElementById('startBtn').innerText = "Escuchando...";
        };
        document.getElementById('stopBtn').onclick = () => {
            recognition.stop();
            document.getElementById('startBtn').style.opacity = "1";
            document.getElementById('startBtn').innerText = "🎤 Empezar";
        };
    </script>
</body>
</html>
